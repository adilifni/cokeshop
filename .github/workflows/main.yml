name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Cordova globally
      run: npm install -g cordova

    - name: Create Clean Cordova Project and Copy Files
      run: |
        cordova create temp_project com.example.cokeshop cokeshop
        rsync -av --exclude='temp_project' --exclude='.github' ./ temp_project/www/
        cd temp_project
        cordova platform add android@12.0.0 --nofetch
        cordova build android --debug --no-telemetry

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: temp_project/platforms/android/app/build/outputs/apk/debug/app-debug.apk
